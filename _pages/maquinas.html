---
layout: default
title: Máquinas
permalink: /maquinas/
---

<main class="container">
  <h1 class="page-title">Posts de Máquinas</h1>

  <div class="posts-list">
    {% for post in site.maquinas %}
      <article class="post">
        <header class="post-header">
          <h2 class="post-title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
          <p class="post-meta">
            Publicado el {{ post.date | date: "%d de %B de %Y" }}
          </p>
        </header>

        <div class="post-content">
          {{ post.content }}
        </div>

        <footer class="post-footer">
          <!-- Puedes agregar aquí cualquier información adicional, como etiquetas, categorías, etc. -->
        </footer>
      </article>
    {% endfor %}
  </div>
</main>
